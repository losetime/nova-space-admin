services:
  # MinIO 对象存储服务
  minio:
    image: minio/minio:latest
    container_name: nova-minio
    restart: unless-stopped
    ports:
      - "9000:9000"  # API 端口
      - "9001:9001"  # Console 端口
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-admin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-admin123456}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    networks:
      - nova-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # 后端服务 - 连接共享数据库
  backend:
    build:
      context: ./backend-nest
      dockerfile: Dockerfile
    container_name: nova-admin-backend
    restart: unless-stopped
    depends_on:
      minio:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - DB_HOST=nova-postgres # 指向共享数据库容器名
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=nova_space
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=7d
      - PORT=3002
      - FRONTEND_URL=http://47.236.101.87
      - SPACE_TRACK_USERNAME=${SPACE_TRACK_USERNAME}
      - SPACE_TRACK_PASSWORD=${SPACE_TRACK_PASSWORD}
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - MINIO_BUCKET=${MINIO_BUCKET:-nova-space}
      - MINIO_USE_SSL=false
      - MINIO_PUBLIC_URL=${MINIO_PUBLIC_URL:-http://8.160.178.247:8081/minio}
      
      # SMTP 邮件配置
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@nova-space.com}
      
      # ESA DISCOS API
      - ESA_DISCOS_API_TOKEN=${ESA_DISCOS_API_TOKEN:-}
      
      # KeepTrack API
      - KEEPTRACK_API_KEY=${KEEPTRACK_API_KEY:-}
      
      # 推送配置
      - PUSH_ENABLED=${PUSH_ENABLED:-true}
      - PUSH_SCHEDULE_TIME=${PUSH_SCHEDULE_TIME:-8}
      - PUSH_BATCH_SIZE=${PUSH_BATCH_SIZE:-10}
      - PUSH_BATCH_INTERVAL=${PUSH_BATCH_INTERVAL:-1}
    networks:
      - nova-network
    extra_hosts:
      - "nova-postgres:host-gateway" # 允许通过容器名访问外部容器
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3002/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nova-admin-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      # 宿主机:容器内
      - "8081:80"
    networks:
      - nova-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  nova-network:
    name: nova-network # 使用共享网络
    external: true # 标记为外部网络（已存在）

volumes:
  minio-data:
